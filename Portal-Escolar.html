<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduBrillante - Portal Secundaria</title>
</head>
<body>

  <!-- HEADER GLOBAL -->
  <header>
    <h1>EduBrillante</h1>
    <p>Plataforma de Gestión Escolar - Secundaria</p>
  </header>

  <!-- ====================== LOGIN ====================== -->
  <main id="loginScreen">
    <section>
      <h2>Iniciar Sesión</h2>
      <form id="loginForm">
        <label for="email">Correo electrónico:</label><br>
        <input type="email" id="email" value="maria.lopez@email.com"><br><br>
        
        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" value="123456"><br><br>
        
        <label for="role">¿Quién eres?</label><br>
        <select id="role">
          <option value="padre">Padre / Madre de Familia</option>
          <option value="estudiante">Estudiante</option>
        </select><br><br>
        
        <button type="button" onclick="login()">Ingresar</button>
      </form>
    </section>
  </main>

  <!-- ====================== PORTAL PRINCIPAL ====================== -->
  <div id="portal" style="display:none;">
    
    <header>
      <h1>EduBrillante</h1>
      <p>Bienvenido, <span id="userName"></span> — <span id="userRole"></span></p>
      <button onclick="logout()">Cerrar sesión</button>
    </header>

    <nav>
      <h2 id="menuTitle">Menú</h2>
      <ul id="menuList"></ul>
    </nav>

    <aside>
      <h3>Información importante</h3>
      <p>Recuerda verificar tu matrícula antes del 30 de abril.</p>
      <p>Próximo pago anual: Mayo 2026</p>
    </aside>

    <main id="content">
      <!-- Contenido dinámico -->
    </main>

    <footer>
      <p>EduBrillante © 2026 - Secundaria</p>
    </footer>
  </div>

  <!-- Modal de confirmación -->
  <dialog id="confirmModal">
    <article>
      <h3 id="modalTitle">Confirmación</h3>
      <p id="modalMessage"></p>
      <button onclick="closeConfirmModal()">Aceptar</button>
    </article>
  </dialog>

<script>
// ================================================
// VARIABLES
// ================================================
let currentUser = { role: "", name: "" };

// ================================================
// LOGIN
// ================================================
function login() {
  const roleValue = document.getElementById('role').value;
  
  currentUser.role = roleValue;
  currentUser.name = roleValue === 'padre' ? 'María López' : 'Juan López';
  
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('portal').style.display = 'block';
  
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('userRole').textContent = roleValue === 'padre' ? 'Padre / Madre de Familia' : 'Estudiante';
  
  generateMenu();
  
  if (currentUser.role === 'padre') {
    showSection('matricula');
  } else {
    showSection('verAsistencia');
  }
}

function logout() {
  if (confirm('¿Cerrar sesión?')) {
    document.getElementById('portal').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
  }
}

// ================================================
// GENERAR MENÚ (sin Agenda)
// ================================================
function generateMenu() {
  const menuList = document.getElementById('menuList');
  menuList.innerHTML = '';
  
  if (currentUser.role === 'padre') {
    document.getElementById('menuTitle').textContent = 'Menú para Padres';
    menuList.innerHTML = `
      <li><button onclick="showSection('matricula')">Matrícula y Reinscripción</button></li>
      <li><button onclick="showSection('calificaciones')">Registro de Calificaciones</button></li>
      <li><button onclick="showSection('pagos')">Pagos Anuales</button></li>
      <li><button onclick="showSection('ausencias')">Reporte de Asistencia / Citación</button></li>
      <li><button onclick="showSection('agenda')">Agenda Semanal</button></li>
    `;
  } else {
    document.getElementById('menuTitle').textContent = 'Menú para Estudiantes';
    menuList.innerHTML = `
      <li><button onclick="showSection('verAsistencia')">Verificar Asistencia</button></li>
      <li><button onclick="showSection('misCalificaciones')">Ver Calificaciones</button></li>
      <li><button onclick="showSection('miAgendaTareas')">Mi Agenda y Tareas</button></li>
    `;
  }
}

// ================================================
// MOSTRAR SECCIÓN
// ================================================
function showSection(section) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (currentUser.role === 'padre') {
    if (section === 'matricula') {
      content.innerHTML = `
        <section>
          <h2>Matrícula y Reinscripción del Estudiante</h2>
          <form>
            <label for="estudianteMat">Nombre completo del estudiante:</label><br>
            <input type="text" id="estudianteMat" value="Juan López"><br><br>
            
            <label for="gradoMat">Grado / Nivel:</label><br>
            <select id="gradoMat">
              <option>1° de Secundaria</option>
              <option>2° de Secundaria</option>
              <option>3° de Secundaria</option>
            </select><br><br>
            
            <label for="fechaMat">Fecha de matrícula / reinscripción:</label><br>
            <input type="date" id="fechaMat"><br><br>
            
            <label for="tipoMat">Tipo de proceso:</label><br>
            <select id="tipoMat">
              <option>Matrícula Nueva</option>
              <option>Reinscripción</option>
            </select><br><br>
            
            <button type="button" onclick="enviarMatricula()">Enviar Matrícula / Reinscripción</button>
          </form>
        </section>
      `;
    }
    else if (section === 'calificaciones') {
      content.innerHTML = `
        <section>
          <h2>Registro de Calificaciones (1.0 - 5.0)</h2>
          <form>
            <label for="estudianteCalif">Estudiante:</label><br>
            <select id="estudianteCalif"><option>Juan López</option><option>Ana López</option></select><br><br>
            
            <label for="materiaCalif">Materia:</label><br>
            <input type="text" id="materiaCalif" placeholder="Ej: Matemáticas"><br><br>
            
            <label for="nota">Nota (1.0 - 5.0):</label><br>
            <input type="number" id="nota" min="1.0" max="5.0" step="0.1" value="4.5"><br><br>
            
            <button type="button" onclick="registrarCalificacion()">Guardar Calificación</button>
          </form>
        </section>
      `;
    }
    else if (section === 'pagos') {
      content.innerHTML = `
        <section>
          <h2>Formulario de Pago</h2>
          <form>
            <label for="numeroTarjeta">Número de la tarjeta:</label><br>
            <input type="text" id="numeroTarjeta" placeholder="1234 5678 9012 3456"><br><br>
            
            <label for="fechaCaducacion">Fecha de caducación:</label><br>
            <input type="text" id="fechaCaducacion" placeholder="MM/AA"><br><br>
            
            <label for="titular">Titular de la tarjeta:</label><br>
            <input type="text" id="titular" placeholder="Nombre completo"><br><br>
            
            <label for="codigoSeguridad">Código de seguridad:</label><br>
            <input type="text" id="codigoSeguridad" placeholder="123"><br><br>
            
            <label for="pais">País:</label><br>
            <input type="text" id="pais" value="Panamá"><br><br>
            
            <button type="button" onclick="realizarPago()">Realizar pago</button>
          </form>
        </section>
      `;
    }
    else if (section === 'ausencias') {
      content.innerHTML = `
        <section>
          <h2>Reporte de Asistencia / Citación</h2>
          <form>
            <label for="estudianteAusente">Estudiante:</label><br>
            <select id="estudianteAusente"><option>Juan López</option><option>Ana López</option></select><br><br>
            
            <label for="fechaAusencia">Fecha:</label><br>
            <input type="date" id="fechaAusencia"><br><br>
            
            <label for="tipoReporte">Tipo:</label><br>
            <select id="tipoReporte">
              <option>Ausencia injustificada</option>
              <option>Ausencia justificada</option>
              <option>Citación a reunión</option>
            </select><br><br>
            
            <button type="button" onclick="reportarAsistencia()">Enviar Reporte</button>
          </form>
        </section>
      `;
    }
    else if (section === 'agenda') {
      content.innerHTML = `
        <section>
          <h2>Agenda Semanal (13 - 17)</h2>
          <p><strong>Lunes 13</strong></p>
          <p>____________________________</p>
          <p>____________________________</p>
          
          <p><strong>Martes 14</strong></p>
          <p>____________________________</p>
          <p>____________________________</p>
          
          <p><strong>Miércoles 15</strong></p>
          <p>____________________________</p>
          <p>____________________________</p>
          
          <p><strong>Jueves 16</strong></p>
          <p>____________________________</p>
          <p>____________________________</p>
          
          <p><strong>Viernes 17</strong></p>
          <p>____________________________</p>
          <p>____________________________</p>
        </section>
      `;
    }
  } 
  else {
    // ====================== VISTA ESTUDIANTE ======================
    if (section === 'verAsistencia') {
      content.innerHTML = `
        <section>
          <h2>Verificar Mi Asistencia</h2>
          <form>
            <label for="fechaAsistEst">Fecha:</label><br>
            <input type="date" id="fechaAsistEst"><br><br>
            <button type="button" onclick="verificarAsistencia()">Consultar Asistencia</button>
          </form>
        </section>
      `;
    }
    else if (section === 'misCalificaciones') {
      content.innerHTML = `
        <section>
          <h2>Ver Calificaciones</h2>
          <label for="buscarMateria">Buscar por materia:</label><br>
          <input type="text" id="buscarMateria" placeholder="Ej: Matemáticas" onkeyup="buscarCalificacion()">
          <br><br>
          <table border="1" id="tablaCalif">
            <thead><tr><th>Materia</th><th>Nota (1.0 - 5.0)</th></tr></thead>
            <tbody>
              <tr><td>Matemáticas</td><td>4.5</td></tr>
              <tr><td>Lengua Española</td><td>4.2</td></tr>
              <tr><td>Ciencias</td><td>4.8</td></tr>
            </tbody>
          </table>
        </section>
      `;
    }
    else if (section === 'miAgendaTareas') {
      content.innerHTML = `
        <section>
          <h2>Mi Agenda y Tareas / Ejercicios</h2>
          <form>
            <label for="fechaTarea">Fecha:</label><br>
            <input type="date" id="fechaTarea"><br><br>
            
            <label for="materiaTarea">Materia:</label><br>
            <input type="text" id="materiaTarea" placeholder="Ej: Ciencias"><br><br>
            
            <label for="descripcionTarea">Tarea o Ejercicio:</label><br>
            <textarea id="descripcionTarea" rows="4" placeholder="Describe la tarea aquí..."></textarea><br><br>
            
            <button type="button" onclick="registrarTareaEstudiante()">Registrar Tarea</button>
          </form>
        </section>
      `;
    }
  }
}

// ================================================
// FUNCIONES
// ================================================
function buscarCalificacion() {
  const filtro = document.getElementById('buscarMateria').value.toLowerCase();
  const filas = document.querySelectorAll('#tablaCalif tbody tr');
  filas.forEach(fila => {
    const materia = fila.cells[0].textContent.toLowerCase();
    fila.style.display = materia.includes(filtro) ? '' : 'none';
  });
}

function enviarMatricula() { showConfirmation("Matrícula enviada correctamente."); }
function registrarCalificacion() { showConfirmation("Calificación registrada correctamente."); }
function procesarPagoAnual() { showConfirmation("Pago anual procesado correctamente."); }
function reportarAsistencia() { showConfirmation("Reporte enviado correctamente."); }
function verificarAsistencia() { showConfirmation("Asistencia consultada correctamente."); }
function registrarTareaEstudiante() { showConfirmation("Tarea registrada correctamente."); }

function realizarPago() {
  showConfirmation("Pago realizado correctamente.<br>Recibirás confirmación por correo.");
}

function showConfirmation(message) {
  const modal = document.getElementById('confirmModal');
  document.getElementById('modalTitle').textContent = 'Éxito';
  document.getElementById('modalMessage').innerHTML = message;
  modal.showModal();
}

function closeConfirmModal() {
  document.getElementById('confirmModal').close();
}
</script>
</body>
</html>
